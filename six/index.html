<body>

    <div class="card">
        <h2>JavaScript</h2>
        <button id="btn">Delete</button>
    </div>

    <script>
        // Question 6 — Remove a Card

        const card = document.querySelector("#card")
        const btn = document.querySelector("#btn")



        btn.addEventListener("click", () => {
            btn.parentElement.remove()
        })
    </script>
